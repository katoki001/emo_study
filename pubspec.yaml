name: ai_learning_companion
description: AI-powered learning app with Flutter UI and Python AI backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  fl_chart: ^1.1.1
  http: ^1.6.0
  audioplayers: ^6.5.1
  flutter_local_notifications: ^20.1.0
  wakelock_plus: ^1.1.4
  file_picker: ^8.1.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/lofi1.mp3
    - assets/audio/lofi2.mp3
    - assets/audio/lofi3.mp3
    - assets/audio/lofi4.mp3
    - assets/audio/lofi5.mp3
    - assets/images/
    - assets/icons/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1C2E4A"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"